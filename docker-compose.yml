services:
  mysql:
    image: mysql:8.4
    container_name: smart-library-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_library
      MYSQL_USER: smartlib
      MYSQL_PASSWORD: smartlib123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: ./backend
    container_name: smart-library-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: smart_library
      MYSQL_USERNAME: smartlib
      MYSQL_PASSWORD: smartlib123
      JWT_SECRET: change_this_to_a_secure_random_secret_at_least_32_chars
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: smart-library-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
